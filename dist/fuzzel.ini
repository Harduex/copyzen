# Scoped fuzzel config for copyzen-menu (loaded via --config) so this config
# never touches your global fuzzel config.

[main]
# Generic monospace resolves via fontconfig to your system mono — always present.
# Swap for a specific face if you like, e.g. font=JetBrainsMono Nerd Font:size=11
font=monospace:size=11
# Wider window so the confirm prompts aren't truncated, and a small tab width so
# the id column (fuzzel < 1.11 has no --with-nth to hide it) sits right next to
# the preview instead of behind a wide 8-space gap.
width=52
tabs=2

# One Dark Pro Darker palette (from Binaryify/OneDark-Pro OneDark-Pro-darker.json).
[colors]
background=23272eff
text=abb2bfff
match=61afefff
selection=2c313aff
selection-text=d7dae0ff
selection-match=61afefff
border=3e4452ff
counter=7f848eff
placeholder=7f848eff

# All three keys avoid fuzzel's default key-bindings, so they override no built-in:
#   Control+s        pin/unpin toggle   (Control+p is taken by `prev`)
#   Control+Shift+d  delete (confirmed) (Control+d alone is fuzzel's `delete-next`)
#   Control+Shift+c  clear history      (Control+c alone is fuzzel's `cancel`)
[key-bindings]
custom-1=Control+s
custom-2=Control+Shift+d
custom-3=Control+Shift+c
