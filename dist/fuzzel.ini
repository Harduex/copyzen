# Scoped fuzzel config for copyzen-menu (loaded via --config) so these bindings
# never touch your global fuzzel config. All three keys avoid fuzzel's default
# key-bindings, so they override no built-in binding:
#   Control+s        pin/unpin toggle   (Control+p is taken by `prev`)
#   Control+Shift+d  delete (confirmed) (Control+d alone is fuzzel's `delete-next`)
#   Control+Shift+c  clear history      (Control+c alone is fuzzel's `cancel`)
[key-bindings]
custom-1=Control+s
custom-2=Control+Shift+d
custom-3=Control+Shift+c
