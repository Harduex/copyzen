# Scoped fuzzel config for copyzen-menu (loaded via --config) so this binding
# never touches your global fuzzel config. Control+s is unused by fuzzel's
# default key-bindings, so adding it for pinning overrides no built-in binding
# (Control+p is taken by `prev`; Control+s keeps copyzen working out of the box).
[key-bindings]
custom-1=Control+s
